name: "Deploy App to SWA"

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "content/articles/**"
      - "content/data/**"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - "src/**"
      - "content/articles/**"
      - "content/data/**"
  workflow_dispatch:

jobs:
  deploy_production:
    if: github.event_name == 'push'
    name: "Deploy App to Production"
    uses: ./.github/workflows/reusable-deploy-static-web-app.yml
    permissions:
      id-token: write
      contents: read
    with:
      github_environment_name: Production
      commit_hash: ${{ github.sha }}
      repository_url: "${{ github.server_url }}/${{ github.repository }}"
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_KEY_VAULT_NAME: ${{ secrets.AZURE_KEY_VAULT_NAME }}

  deploy_preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.user.login != 'dependabot[bot]'
    name: "Deploy App to Preview"
    uses: ./.github/workflows/reusable-deploy-static-web-app.yml
    permissions:
      id-token: write
      contents: read
    with:
      github_environment_name: Preview
      static_web_app_environment_name: pr-${{ github.event.pull_request.number }}
      commit_hash: ${{ github.sha }}
      repository_url: "${{ github.server_url }}/${{ github.repository }}"
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_KEY_VAULT_NAME: ${{ secrets.AZURE_KEY_VAULT_NAME }}

  comment_preview_url:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    name: "Comment Preview URL"
    runs-on: ubuntu-latest
    needs: deploy_preview
    permissions:
      issues: write
    steps:
      - name: Comment preview URL
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ needs.deploy_preview.outputs.static_web_app_url }}
          PREVIEW_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const marker = '<!-- swa-preview-url -->';
            const previewUrl = process.env.PREVIEW_URL;
            const previewSha = process.env.PREVIEW_SHA;

            if (!previewUrl) {
              core.setFailed('Azure Static Web Apps did not return a preview URL.');
              return;
            }

            const normalizedPreviewUrl = /^https?:\/\//.test(previewUrl)
              ? previewUrl
              : `https://${previewUrl}`;

            const body = [
              marker,
              '### Azure Static Web Apps preview',
              '',
              `Preview URL: ${normalizedPreviewUrl}`,
              '',
              `Updated for commit ${previewSha}.`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existingComment = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.user.login != 'dependabot[bot]'
    name: "Close Pull Request"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: Preview
    steps:
      - name: Azure CLI Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get secrets from Key Vault
        id: get-secrets
        env:
          AZURE_KEY_VAULT_NAME: ${{ secrets.AZURE_KEY_VAULT_NAME }}
        run: |
          echo "deployment_token=$(az keyvault secret show --name StaticWebAppDeploymentKey --vault-name "$AZURE_KEY_VAULT_NAME" --query value -o tsv)" >> $GITHUB_OUTPUT

      - name: Close preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.get-secrets.outputs.deployment_token }}
          action: close
          deployment_environment: pr-${{ github.event.pull_request.number }}
