name: "Deploy App to SWA"

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "content/**"
      - ".github/workflows/deploy-app.yml"
      - ".github/workflows/deploy-app-swa.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - "src/**"
      - "content/**"
      - ".github/workflows/deploy-app.yml"
      - ".github/workflows/deploy-app-swa.yml"
  workflow_dispatch:

jobs:
  deploy_production:
    if: github.event_name == 'push'
    name: "Deploy App to Production"
    uses: ./.github/workflows/deploy-app-swa.yml
    permissions:
      id-token: write
      contents: read
    with:
      github_environment: Production
      commit_hash: ${{ github.sha }}
      repository_url: "${{ github.server_url }}/${{ github.repository }}"
    secrets: inherit

  deploy_preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    name: "Deploy App to Preview"
    uses: ./.github/workflows/deploy-app-swa.yml
    permissions:
      id-token: write
      contents: read
    with:
      github_environment: Preview
      deployment_environment: pr-${{ github.event.pull_request.number }}
      commit_hash: ${{ github.sha }}
      repository_url: "${{ github.server_url }}/${{ github.repository }}"
    secrets: inherit

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    name: "Close Pull Request"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: Preview
    steps:
      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get secrets from Key Vault
        id: get-secrets
        env:
          AZURE_KEY_VAULT_NAME: ${{ secrets.AZURE_KEY_VAULT_NAME }}
        run: |
          echo "deployment_token=$(az keyvault secret show --name StaticWebAppDeploymentKey --vault-name "$AZURE_KEY_VAULT_NAME" --query value -o tsv)" >> $GITHUB_OUTPUT

      - name: Close preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.get-secrets.outputs.deployment_token }}
          action: close
          deployment_environment: pr-${{ github.event.pull_request.number }}
