name: "Deploy App to SWA"

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "content/articles/**"
      - "content/data/**"
      - ".github/actions/**"
      - ".github/workflows/deploy-app.yml"
      - ".github/workflows/reusable-deploy-static-web-app.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - "src/**"
      - "content/articles/**"
      - "content/data/**"
      - ".github/actions/**"
      - ".github/workflows/deploy-app.yml"
      - ".github/workflows/reusable-deploy-static-web-app.yml"
  workflow_dispatch:

jobs:
  deploy_production:
    if: github.event_name == 'push'
    name: "Deploy App to Production"
    uses: ./.github/workflows/reusable-deploy-static-web-app.yml
    permissions:
      id-token: write
      contents: read
    with:
      github_environment_name: Production
      commit_hash: ${{ github.sha }}
      repository_url: "${{ github.server_url }}/${{ github.repository }}"
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_KEY_VAULT_NAME: ${{ secrets.AZURE_KEY_VAULT_NAME }}

  deploy_preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.user.login != 'dependabot[bot]'
    name: "Deploy App to Preview"
    uses: ./.github/workflows/reusable-deploy-static-web-app.yml
    permissions:
      id-token: write
      contents: read
    with:
      github_environment_name: Preview
      static_web_app_environment_name: pr-${{ github.event.pull_request.number }}
      commit_hash: ${{ github.sha }}
      repository_url: "${{ github.server_url }}/${{ github.repository }}"
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_KEY_VAULT_NAME: ${{ secrets.AZURE_KEY_VAULT_NAME }}

  comment_preview_url:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    name: "Comment Preview URL"
    runs-on: ubuntu-latest
    needs: deploy_preview
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Normalize preview URL
        id: preview-url
        env:
          PREVIEW_URL: ${{ needs.deploy_preview.outputs.static_web_app_url }}
        run: |
          if [[ -z "$PREVIEW_URL" ]]; then
            echo "::error::Azure Static Web Apps did not return a preview URL."
            exit 1
          fi

          if [[ "$PREVIEW_URL" == http://* || "$PREVIEW_URL" == https://* ]]; then
            normalized_preview_url="$PREVIEW_URL"
          else
            normalized_preview_url="https://$PREVIEW_URL"
          fi

          echo "url=$normalized_preview_url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        uses: ./.github/actions/upsert-issue-comment
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-marker: "<!-- swa-preview-url -->"
          body: |
            ### Azure Static Web Apps preview

            Preview URL: ${{ steps.preview-url.outputs.url }}

            Updated for commit ${{ github.event.pull_request.head.sha }}.

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.user.login != 'dependabot[bot]'
    name: "Close Pull Request"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: Preview
    steps:
      - name: Azure CLI Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get secrets from Key Vault
        id: get-secrets
        env:
          AZURE_KEY_VAULT_NAME: ${{ secrets.AZURE_KEY_VAULT_NAME }}
        run: |
          echo "deployment_token=$(az keyvault secret show --name StaticWebAppDeploymentKey --vault-name "$AZURE_KEY_VAULT_NAME" --query value -o tsv)" >> $GITHUB_OUTPUT

      - name: Close preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.get-secrets.outputs.deployment_token }}
          action: close
          deployment_environment: pr-${{ github.event.pull_request.number }}
