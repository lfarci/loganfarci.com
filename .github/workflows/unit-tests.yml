name: Unit Tests

on:
  pull_request:
    paths:
      - "src/src/**"
      - "src/tests/unit/**"

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --reporter=verbose --reporter=github-actions --reporter=json --outputFile=test-results.json

      - name: Write test summary
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
            const suites = (r.testResults || []).filter(s => s.assertionResults && s.assertionResults.length > 0);
            const lines = [
              '## Unit Test Results',
              '',
              \`| | Count |\`,
              \`|---|---|\`,
              \`| ✅ Passed | \${r.numPassedTests} |\`,
              \`| ❌ Failed | \${r.numFailedTests} |\`,
              \`| ⏭️ Skipped | \${r.numPendingTests} |\`,
              \`| 📁 Test files | \${suites.length} |\`,
              '',
            ];
            if (suites.length > 0) {
              lines.push('### Files');
              lines.push('');
              for (const suite of suites) {
                const rel = suite.name.replace(process.cwd() + '/', '');
                const passed = suite.assertionResults.filter(a => a.status === 'passed').length;
                const failed = suite.assertionResults.filter(a => a.status === 'failed').length;
                const icon = suite.status === 'passed' ? '✅' : '❌';
                lines.push(\`- \${icon} \\\`\${rel}\\\` (\${passed} passed, \${failed} failed)\`);
              }
            }
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n'));
          "

