name: Lint

on:
  push:
    branches:
      - main
    paths:
      - "src/src/**"
      - "src/scripts/**"
      - "src/plugins/**"
      - "src/eslint.config.mjs"
      - "src/package.json"
      - "src/package-lock.json"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "src/src/**"
      - "src/scripts/**"
      - "src/plugins/**"
      - "src/eslint.config.mjs"
      - "src/package.json"
      - "src/package-lock.json"
      - ".github/workflows/lint.yml"

jobs:
  lint:
    name: Run linter
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
